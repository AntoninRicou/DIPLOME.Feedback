<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FEEDBACK THREE MAP</title>
  <!-- FOUC guard. The bundled style.css is injected by main.js (dev) / loaded
       as a separate asset (build), so for one paint the body can render the
       baked-in corner-label text ("Source" / "Form" / "Semantic" / "Time") and
       other title surfaces UNSTYLED — full opacity, unpositioned — before
       `.corner-label { opacity: 0 }` applies. That's the intermittent top-left
       "Source" flash on the VIEW_2 embed iframe (it reloads fresh each time).
       Hide every title surface from the first paint; the real reveal rules in
       style.css have higher specificity, so this never blocks them. -->
  <style>
    .corner-label,
    .canvas-text,
    .explore-map-label,
    #center-caption { opacity: 0; }
  </style>
</head>

<body>
  <div id="container-1" class="container">
    <span class="corner-label" data-position="tl">Source</span>
    <div class="canvas-text" data-canvas="0">
      <p class="canvas-text-title"></p>
      <p class="canvas-text-body"></p>
    </div>
  </div>
  <div id="container-2" class="container">
    <span class="corner-label" data-position="tr">Form</span>
    <div class="canvas-text" data-canvas="1">
      <p class="canvas-text-title"></p>
      <p class="canvas-text-body"></p>
    </div>
  </div>
  <div id="container-3" class="container">
    <span class="corner-label" data-position="bl">Semantic</span>
    <div class="canvas-text" data-canvas="2">
      <p class="canvas-text-title"></p>
      <p class="canvas-text-body"></p>
    </div>
  </div>
  <div id="container-4" class="container">
    <span class="corner-label" data-position="br">Time</span>
    <div class="canvas-text" data-canvas="3">
      <p class="canvas-text-title"></p>
      <p class="canvas-text-body"></p>
    </div>
  </div>
  <div id="render-mask" aria-hidden="true"></div>
  <div id="render-veil" aria-hidden="true"></div>
  <!-- Luminosity dimmer: a black overlay above everything, opacity driven by
       the `set-dim` directive (level 0 = full brightness, 1 = fully dark). -->
  <div id="render-dim" aria-hidden="true"></div>
  <p id="center-caption" aria-hidden="true"></p>
  <!-- Single-explore map label: names the auto-cycling map at the viewport's
       top-left while project is in the explore single view. Driven by the
       `set-map-label` directive (on/off); its text is rewritten every map
       cycle by stateManager. Deliberately NOT given the `.corner-label`
       class, so the per-canvas corner-label rules / `set-corner-labels`
       sweep can never touch it. -->
  <span id="explore-map-label" class="explore-map-label" aria-hidden="true"></span>
  <!-- Map-words overlay: a few "most characteristic word per zone" labels
       spread across the explore-single map (keywords on the Form map, subjects
       on the Source map). Each label is anchored to a representative sprite's
       on-screen position (updated per frame by mapWords.js). Driven by the
       set-map-words directive. -->
  <div id="map-words" aria-hidden="true"></div>
  <!-- Cursor hint (standalone feedback window only): follows the cursor and
       tells the operator to move it back to the interface screen. Shown
       whenever the mouse is over this (fullscreen) feedback display; wired in
       main.js, guarded to the non-embed path. -->
  <div id="cursor-hint" aria-hidden="true">Bring the cursor top right</div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
